name: Run TikTok Script

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    # Verleng de totale timeout voor de job aangezien browser-init en scrollen tijd kosten
    timeout-minutes: 10 
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Write service account file
        shell: bash
        run: |
          echo "$GOOGLE_JSON" > service_account.json
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Zorg dat gspread, google-auth en playwright in requirements.txt staan
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run script
        # Gebruik unbuffer of stdbuf om logs direct te zien in de GitHub console
        run: python -u main.py 
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Upload Debug Screenshot
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-debug-image
          # We gebruiken een wildcard voor het geval er meerdere screenshots worden gemaakt
          path: "*.png" 
          retention-days: 5
