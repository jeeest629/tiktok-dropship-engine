name: Run TikTok Script

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Write service account file
        shell: bash
        run: |
          echo "$GOOGLE_JSON" > service_account.json
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run script
        run: python main.py
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}

      # NIEUWE STAP: Sla de screenshot op als 'Artifact'
      - name: Upload Debug Screenshot
        if: always() # Zorgt dat dit ook gebeurt als het script faalt
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-debug-image
          path: tiktok_debug.png
          retention-days: 5
